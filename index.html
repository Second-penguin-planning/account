<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>会計入力</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f6f7f9;
      color: #222;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 16px;
    }
    h1 {
      font-size: 22px;
      margin: 8px 0 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }
    label {
      display: block;
      font-size: 14px;
      margin: 12px 0 6px;
      font-weight: 600;
    }
    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      border-radius: 12px;
      border: 1px solid #d0d7de;
      padding: 14px;
      background: #fff;
    }
    textarea {
      min-height: 88px;
      resize: vertical;
    }
    button {
      margin-top: 16px;
      border: none;
      background: #0b74ff;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .message {
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
      white-space: pre-wrap;
    }
    .success {
      background: #e8f7ee;
      color: #116b3a;
      border: 1px solid #bfe7cd;
    }
    .error {
      background: #fdecec;
      color: #a12222;
      border: 1px solid #f3bcbc;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>会計入力</h1>

    <div class="card">
      <form id="salesForm">
        <label for="date">日付</label>
        <input type="date" id="date" name="date" required />

        <label for="client_name">取引先名</label>
        <input type="text" id="client_name" name="client_name" required />

        <label for="description">内容</label>
        <input type="text" id="description" name="description" required />

        <div class="row">
          <div>
            <label for="amount">金額</label>
            <input type="number" id="amount" name="amount" inputmode="numeric" required />
          </div>
          <div>
            <label for="payment_method">支払方法</label>
            <select id="payment_method" name="payment_method" required>
              <option value="">選択してください</option>
              <option value="cash">現金</option>
              <option value="bank">振込</option>
              <option value="card">カード</option>
              <option value="other">その他</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="payment_status">入金状況</label>
            <select id="payment_status" name="payment_status" required>
              <option value="">選択してください</option>
              <option value="paid">入金済み</option>
              <option value="unpaid">未入金</option>
              <option value="partial">一部入金</option>
            </select>
          </div>
          <div></div>
        </div>

        <label for="memo">メモ</label>
        <textarea id="memo" name="memo" placeholder="任意"></textarea>

        <button type="submit" id="submitBtn">保存する</button>
      </form>

      <div id="message" class="message"></div>
    </div>
  </div>

  <script>
    const API_URL = "https://YOUR-WORKER-URL.workers.dev";

    const form = document.getElementById("salesForm");
    const message = document.getElementById("message");
    const submitBtn = document.getElementById("submitBtn");

    // 今日の日付を初期値にする
    document.getElementById("date").value = new Date().toISOString().slice(0, 10);

    function showMessage(text, type) {
      message.textContent = text;
      message.className = `message ${type}`;
      message.style.display = "block";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      message.style.display = "none";
      submitBtn.disabled = true;
      submitBtn.textContent = "送信中...";

      const data = {
        date: document.getElementById("date").value,
        client_name: document.getElementById("client_name").value.trim(),
        description: document.getElementById("description").value.trim(),
        amount: document.getElementById("amount").value,
        payment_method: document.getElementById("payment_method").value,
        payment_status: document.getElementById("payment_status").value,
        memo: document.getElementById("memo").value.trim(),
      };

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(data),
        });

        const result = await res.json();

        if (!res.ok) {
          throw new Error(result.error || "送信に失敗しました");
        }

        showMessage("保存しました。", "success");
        form.reset();
        document.getElementById("date").value = new Date().toISOString().slice(0, 10);
      } catch (err) {
        showMessage("エラー: " + err.message, "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "保存する";
      }
    });
  </script>
</body>
</html>
